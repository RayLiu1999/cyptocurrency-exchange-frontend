name: Frontend CD GitOps

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: rayliu1999
  IMAGE_NAME: exchange-frontend
  OPS_REPO: RayLiu1999/side_project_ops
  OPS_REPO_PATH: projects/crypto-exchange/frontend

jobs:
  build-and-push:
    name: Build and Push Frontend Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_WS_URL=${{ secrets.VITE_WS_URL }}

  update-gitops:
    name: Update Frontend GitOps Manifest
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Checkout ops repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OPS_REPO }}
          token: ${{ secrets.OPS_REPO_PUSH_TOKEN }}
          path: ops-repo

      - name: Update image tag in GitOps repo
        run: |
          set -euo pipefail
          IMAGE_TAG="sha-$(git rev-parse --short=7 "$GITHUB_SHA")"
          FILE="ops-repo/${OPS_REPO_PATH}/deployment.yaml"
          IMAGE="ghcr.io/${IMAGE_OWNER}/${IMAGE_NAME}"

          sed -i.bak -E "s|image: ${IMAGE}:.*$|image: ${IMAGE}:${IMAGE_TAG}|" "$FILE"
          rm -f "${FILE}.bak"

      - name: Commit and push GitOps changes
        run: |
          set -euo pipefail
          cd ops-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No GitOps changes to commit"
            exit 0
          fi

          git add projects/crypto-exchange/frontend/deployment.yaml
          git commit -m "chore(crypto-exchange): update frontend image to ${GITHUB_SHA::7}"
          git push origin HEAD
